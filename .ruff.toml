# Ruff configuration for ai_web_scraper
#
# Rules suppressed intentionally:
#   E501  - Line too long — many long strings (JS snippets, regexes,
#           log messages) that would be less readable if split
#   SLF001 - Private member access — tightly-coupled coordinator/client
#            callback wiring and test helpers are intentional
#   PLR0912 - Too many branches — pre-existing complexity in error
#             handling methods; refactoring deferred
#   PLR2004 - Magic value comparisons — named constants already used
#             where practical; remaining literals are self-evident
#             (small integers, common thresholds)

[lint]
ignore = ["E501", "SLF001", "PLR0912", "PLR2004"]
